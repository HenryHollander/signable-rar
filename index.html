<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Documents</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; }
        nav { background: #1a1a2e; padding: 12px 24px; display: flex; gap: 16px; align-items: center; }
        nav a { color: #e0e0e0; text-decoration: none; padding: 6px 14px; border-radius: 4px; font-size: 14px; }
        nav a:hover, nav a.active { background: #4a4a8a; color: #fff; }
        iframe { border: none; width: 100%; height: calc(100vh - 44px); display: block; }
        .home { color: #aaa; padding: 60px; text-align: center; }
        .home h2 { margin-bottom: 24px; }
        .home a { display: inline-block; margin: 8px; padding: 12px 24px; background: #1a1a2e; color: #fff; border-radius: 6px; text-decoration: none; }
        .home a:hover { background: #4a4a8a; }
    </style>
</head>
<body>
    <nav>
        <a href="#rar">Consult RAR Template</a>
        <a href="#quote">Momentum Life Quote</a>
    </nav>
    <div id="content"></div>

    <script>
        const pages = {
            rar: 'Consult RAR Template for Signing.html',
            quote: 'Momentum Life Quote.html'
        };

        function render() {
            const hash = location.hash.slice(1);
            const content = document.getElementById('content');
            const links = document.querySelectorAll('nav a');

            links.forEach(a => {
                a.classList.toggle('active', a.getAttribute('href') === '#' + hash);
            });

            if (pages[hash]) {
                content.innerHTML = `<iframe src="${pages[hash]}"></iframe>`;
            } else {
                content.innerHTML = `<div class="home">
                    <h2>Select a document</h2>
                    <a href="#rar">Consult RAR Template for Signing</a>
                    <a href="#quote">Momentum Life Quote</a>
                </div>`;
            }
        }

        window.addEventListener('hashchange', render);
        render();
    </script>
</body>
</html>
