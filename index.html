<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Documents</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; }
        nav { background: #1a1a2e; padding: 12px 24px; display: flex; gap: 16px; align-items: center; }
        nav a { color: #e0e0e0; text-decoration: none; padding: 6px 14px; border-radius: 4px; font-size: 14px; }
        nav a:hover, nav a.active { background: #4a4a8a; color: #fff; }
        iframe { border: none; width: 100%; height: calc(100vh - 44px); display: block; }
        .home { color: #aaa; padding: 60px; text-align: center; }
        .home h2 { margin-bottom: 24px; }
        .home a { display: inline-block; margin: 8px; padding: 12px 24px; background: #1a1a2e; color: #fff; border-radius: 6px; text-decoration: none; }
        .home a:hover { background: #4a4a8a; }
    </style>
</head>
<body>
    <nav>
        <a href="#lifeclientrar">Client Replacement Advice Record</a>
        <a href="#lifebrokerrar">Broker Replacement Advice Record</a>
        <a href="#lifequote">Momentum Life Quotation</a>
        <a href="#sticlientproposal">Client Short Term Proposal</a>
        <a href="#sticlientquote">Client Short Term Quote</a>
        <a href="#stibrokerproposal">Broker Short Term Proposal</a>
    </nav>
    <div id="content"></div>

    <script>
        const pages = {
            lifeclientrar:    'Client Replacement Advice Record.html',
            lifequote:        'Momentum Life Quotation.html',
            sticlientproposal:'Client Short Term Proposal.html',
            sticlientquote:   'Client Renasa Quotation.html',
            lifebrokerrar:    'Broker Replacement Advice Record.html',
            stibrokerproposal:'Broker Short TermProposal.html',
            roadmap:          'Laminin_Demo_Roadmap_Mobile.html'
        };

        const lockedHashes = new Set(['roadmap']);

        const subIndexes = {
            lifeclient: {
                links: [
                    { hash: 'lifeclientrar', label: 'Client Replacement Advice Record' },
                    { hash: 'lifequote',     label: 'Momentum Life Quotation' }
                ]
            }
        };

        const pageSubIndex = {
            lifeclientrar: 'lifeclient',
            lifequote:     'lifeclient'
        };

        function render() {
            const hash = location.hash.slice(1);

            if (lockedHashes.has(location._lockedTo) && !lockedHashes.has(hash)) {
                location.hash = location._lockedTo;
                return;
            }
            location._lockedTo = lockedHashes.has(hash) ? hash : null;
            const content = document.getElementById('content');
            const links = document.querySelectorAll('nav a');

            links.forEach(a => {
                a.classList.toggle('active', a.getAttribute('href') === '#' + hash);
            });

            if (pages[hash]) {
                const parentKey = pageSubIndex[hash];
                const parent = parentKey && subIndexes[parentKey];
                if (parent) {
                    document.querySelector('nav').style.display = 'none';
                    const navItems = parent.links.map(l => `<a href="#${l.hash}" style="color:${l.hash===hash?'#fff':'#e0e0e0'};text-decoration:none;padding:6px 14px;border-radius:4px;font-size:14px;${l.hash===hash?'background:#4a4a8a;':''}">${l.label}</a>`).join('');
                    content.innerHTML = `
                        <nav style="background:#1a1a2e;padding:12px 24px;display:flex;gap:16px;">
                            ${navItems}
                        </nav>
                        <iframe src="${pages[hash]}" style="height:calc(100vh - 44px);border:none;width:100%;display:block;"></iframe>`;
                } else {
                    document.querySelector('nav').style.display = 'none';
                    content.innerHTML = `<iframe src="${pages[hash]}" style="height:100vh"></iframe>`;
                }
            } else if (subIndexes[hash]) {
                document.querySelector('nav').style.display = 'none';
                const subLinks = subIndexes[hash].links;
                const navItems = subLinks.map(l => `<a href="#${l.hash}">${l.label}</a>`).join('');
                const homeItems = subLinks.map(l => `<a href="#${l.hash}">${l.label}</a>`).join('');
                content.innerHTML = `
                    <nav style="background:#1a1a2e;padding:12px 24px;display:flex;gap:16px;">
                        ${navItems}
                    </nav>
                    <div class="home">
                        <h2>Select a document</h2>
                        ${homeItems}
                    </div>`;
            } else {
                document.querySelector('nav').style.display = '';
                content.innerHTML = `<div class="home">
                    <h2>Select a document</h2>
                    <a href="#lifeclientrar">Client Replacement Advice Record</a>
                    <a href="#lifebrokerrar">Broker Replacement Advice Record</a>
                    <a href="#lifequote">Momentum Life Quotation</a>
                    <a href="#sticlientproposal">Client Short Term Proposal</a>
                    <a href="#sticlientquote">Client Short Term Quote</a>
                    <a href="#stibrokerproposal">Broker Short Term Proposal</a>
                </div>`;
            }
        }

        window.addEventListener('hashchange', render);
        render();
    </script>
</body>
</html>
